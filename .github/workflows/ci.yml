name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  backend:
    name: Backend (typecheck + jest + rbac)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Dummy values so the bootstrap-time env validators don't throw
      # while running pure-static checks.
      PROPELAUTH_AUTH_URL: https://example.invalid
      PROPELAUTH_API_KEY: ci-placeholder
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USERNAME: ci
      DB_PASSWORD: ci
      DB_NAME: ci
      DB_SCHEMA: public
      CORS_ORIGINS: http://localhost:5173
      TYPEORM_SYNCHRONIZE: 'false'
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Unit tests (rbac coverage included)
        run: npx jest --colors

  frontend:
    name: Frontend (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build --if-present

  shellcheck:
    name: Ops shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on backup scripts
        run: |
          if [ -d ops/backup ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
            shellcheck -S warning ops/backup/*.sh
          fi
