name: macOS Agent

on:
  push:
    branches: [master, main]
    paths:
      - 'macApp/**'
      - '.github/workflows/macos-agent.yml'
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [master, main]
    paths:
      - 'macApp/**'
  workflow_dispatch:

permissions:
  contents: write  # needed to attach the installer to a GitHub Release.

jobs:
  build:
    name: Build agent + GUI + installer
    runs-on: macos-latest
    defaults:
      run:
        working-directory: macApp

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: macApp/requirements.txt

      # Signing/notarization secrets are optional -- a fork or a PR from
      # outside the org won't have them, so fall back to an unsigned build
      # (Gatekeeper will block it on another Mac, but the workflow still
      # validates that the agent + GUI + pkg actually build).
      - name: Import signing certificate
        if: ${{ secrets.APPLE_CERT_P12_BASE64 != '' }}
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$CERT_P12_BASE64" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f cert.p12

      - name: Build (agent + GUI + installer, signed)
        if: ${{ secrets.APPLE_CERT_P12_BASE64 != '' }}
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_DEVELOPER_ID_INSTALLER: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
        run: ./scripts/build.sh

      - name: Build (agent + GUI + installer, unsigned)
        if: ${{ secrets.APPLE_CERT_P12_BASE64 == '' }}
        run: ./scripts/build.sh --skip-sign

      - name: Compute installer path
        id: artefact
        run: |
          PKG=$(ls installer/Output/InfraPilotAgentSetup-*.pkg | head -n1)
          if [ -z "$PKG" ]; then echo "Installer not produced." >&2; exit 1; fi
          echo "path=$PKG" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$PKG")" >> "$GITHUB_OUTPUT"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: InfraPilotAgentSetup-macos
          path: macApp/installer/Output/InfraPilotAgentSetup-*.pkg
          if-no-files-found: error
          retention-days: 30

      - name: Upload raw agent + GUI bundles (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: infrapilot-agent-macos-binaries
          path: |
            macApp/dist/infrapilot-agent
            macApp/dist/InfraPilot Agent.app
          if-no-files-found: warn
          retention-days: 14

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: macApp/installer/Output/InfraPilotAgentSetup-*.pkg
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## InfraPilot macOS Agent ${{ github.ref_name }}

            Installer: **${{ steps.artefact.outputs.name }}**

            ### Install
            ```bash
            curl -fsSL "<installerUrl from Settings > macOS Agent>" -o /tmp/InfraPilotAgentSetup.pkg
            sudo BACKEND_URL="<backend>" ENROLL_TOKEN="<token>" installer -pkg /tmp/InfraPilotAgentSetup.pkg -target /
            ```

            See [macApp/README.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/macApp/README.md)
            for backend setup and the CLI flags.
