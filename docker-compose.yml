# Local prod-parity stack. On AWS you would normally drop the `db` service in
# favour of RDS Postgres and `uploads` in favour of EFS — leave the rest alone.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # Override host so the API talks to the compose service, not localhost.
      DB_HOST: db
      DB_PORT: "5432"
      NODE_ENV: production
      PORT: "3000"
    volumes:
      - uploads:/app/uploads
      # AD/TLS material, mounted read-only. Comment out if unused.
      - ./backend/certs:/app/certs:ro
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Vite freezes these into the bundle at build time.
        VITE_API_URL: ${VITE_API_URL}
        VITE_AUTH_URL: ${VITE_AUTH_URL}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
  uploads:
