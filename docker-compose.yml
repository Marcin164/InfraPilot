services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      NODE_ENV: production
      PORT: "3000"
    volumes:
      - uploads:/app/uploads
      - certs:/app/certs
    ports:
      - "3000:3000"     # dostępny z całej sieci

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://192.168.1.41:3000
        VITE_AUTH_URL: ${VITE_AUTH_URL:-}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"   # tylko dla hosta Nginx

volumes:
  pgdata:
  uploads:
  certs:
