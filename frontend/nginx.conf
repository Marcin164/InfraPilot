server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets — bundled JS/CSS shrink ~70%.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Hash-named static assets (Vite emits /assets/*-<hash>.{js,css}) — long
    # cache; immutable means browsers won't even revalidate.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback — every unknown path serves index.html so React Router can
    # resolve the route on the client.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # index.html must never be cached — it carries the references to hashed
    # bundles and needs to update immediately on deploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Don't expose the nginx version in error pages / Server header.
    server_tokens off;
}
